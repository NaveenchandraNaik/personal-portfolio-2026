<main class="main-container" id="contact">
  <section class="contact-detail">
    <h1>Contact Me</h1>

    <section class="contact-info">
      <p><app-icons iconName="faEnvelope" size="lg"></app-icons> ncnaik131@gmail.com</p>
      <p><app-icons iconName="faPhone" size="lg"></app-icons> +91 8660805146</p>
      <p><app-icons iconName="faLocationDot" size="lg"></app-icons> Bangalore, India</p>
    </section>
    <section class="social-icons">
      <a href="https://github.com/NaveenchandraNaik" class="icon" target="_blank"><app-icons iconName="faGithub" size="lg"></app-icons></a>
      <a href="https://www.linkedin.com/in/naveenchandra-naik-a38668237/" class="icon" target="_blank"><app-icons iconName="faLinkedin" size="lg"></app-icons></a>
      <a href="#" class="icon" target="_blank"><app-icons iconName="faTwitter" size="lg"></app-icons></a>
      <a href="#" class="icon" target="_blank"><app-icons iconName="faFacebook" size="lg"></app-icons></a>
    </section>
    <section>
      <action-button color="primary" label="Download CV" (buttonEvent)="download()"></action-button>
    </section>
  </section>
  <section class="contact-form">
    <mat-form-field appearance="outline">
      <mat-label>Your Name</mat-label>
      <input matInput />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Your Subject</mat-label>
      <input matInput />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Your Message</mat-label>
      <textarea matInput></textarea>
    </mat-form-field>
    <action-button color="primary" label="Submit" (buttonEvent)="submitForm()"></action-button>
  </section>
</main>
